<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暖暖小窝</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <h1>暖暖小窝</h1>
    <p class="subtitle">好友协作工具</p>

    <div class="login-field">
      <label for="username-input">你的昵称</label>
      <input class="input" type="text" id="username-input" placeholder="输入你的昵称..." maxlength="12" autocomplete="off" />
    </div>

    <div class="login-field">
      <label for="server-input">服务器地址</label>
      <input class="input" type="text" id="server-input" placeholder="ws://192.168.x.x:9001" value="ws://localhost:9001" autocomplete="off" />
    </div>

    <div class="login-actions">
      <button class="btn btn-primary" id="enter-btn">进入</button>
    </div>

    <div class="login-status" id="login-status"></div>

    <div class="login-footer">
      <div class="version" id="login-version">v1.1.2 · 浏览器插件版</div>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div class="app-shell" id="app-shell">
  <div class="room-info-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    暖暖小窝
    <span class="lan-ip-badge" id="lan-ip-display" style="display:none;"></span>
    <span class="member-count" id="member-count">1 人在线</span>
    <span class="version-badge" id="version-badge"></span>
    <button class="leave-btn" id="leave-room-btn">退出</button>
  </div>

  <!-- 更新提示 -->
  <div class="update-banner" id="update-banner" style="display:none;"></div>

  <div class="tab-bar">
    <button class="tab-btn active" data-page="page-chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      聊天
    </button>
    <button class="tab-btn" data-page="page-todo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      待办
    </button>
    <button class="tab-btn" data-page="page-lunch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      午餐
    </button>
  </div>

  <!-- CHAT PAGE -->
  <div class="page active" id="page-chat">
    <div class="chat-container">
      <div class="chat-sidebar">
        <input class="input contact-search" type="text" id="contact-search-input" placeholder="搜索联系人..." />
        <div id="contact-list"></div>
      </div>
      <div class="chat-main">
        <div class="chat-empty" id="chat-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p>选择一个联系人开始聊天</p>
        </div>
        <div class="chat-active" id="chat-active-view" style="display:none;">
          <div class="chat-header">
            <span id="chat-header-name"></span>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="quote-bar" id="quote-bar" style="display:none;"></div>
          <div class="emoji-panel" id="emoji-panel" style="display:none;"></div>
          <div class="chat-input-area">
            <button class="emoji-btn" id="emoji-btn" title="表情">😊</button>
            <textarea class="input chat-input" id="chat-input" placeholder="输入消息..." rows="1"></textarea>
            <button class="btn btn-primary send-btn" id="send-btn">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TODO PAGE -->
  <div class="page" id="page-todo">
    <div class="todo-header">
      <h2>待办事项</h2>
      <div class="todo-stats">
        <span class="stat-badge">共 <span id="todo-total">0</span></span>
        <span class="stat-badge done">完成 <span id="todo-done">0</span></span>
      </div>
    </div>
    <div class="todo-add">
      <input class="input" type="text" id="todo-input" placeholder="添加新的待办事项..." />
      <select class="input todo-priority" id="todo-priority">
        <option value="low">低</option>
        <option value="medium" selected>中</option>
        <option value="high">高</option>
      </select>
      <button class="btn btn-primary" id="todo-add-btn">添加</button>
    </div>
    <div class="todo-filters">
      <button class="filter-chip active" data-filter="all">全部</button>
      <button class="filter-chip" data-filter="active">未完成</button>
      <button class="filter-chip" data-filter="done">已完成</button>
    </div>
    <div class="todo-list" id="todo-list"></div>
  </div>

  <!-- LUNCH PAGE -->
  <div class="page" id="page-lunch">
    <div class="lunch-header">
      <h2>今天吃什么？</h2>
      <p class="lunch-subtitle">让命运来决定你的午餐吧！</p>
    </div>
    <div class="lunch-wheel-container">
      <div class="lunch-wheel" id="lunch-wheel">
        <svg viewBox="0 0 200 200" id="wheel-svg"></svg>
      </div>
      <div class="wheel-pointer"></div>
    </div>
    <button class="btn btn-primary spin-btn" id="spin-btn">开始转盘</button>
    <div class="lunch-result" id="lunch-result" style="display:none;">
      <div class="result-text" id="result-text"></div>
    </div>
    <div class="food-input">
      <input class="input" type="text" id="food-input" placeholder="添加食物选项..." />
      <button class="btn btn-secondary" id="food-add-btn">添加</button>
    </div>
    <div class="food-tags" id="food-tags"></div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
