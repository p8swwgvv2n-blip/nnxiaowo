<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>暖暖小窝 - 局域网小工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --seed-bg: #F8F8F0;
  --seed-fg: #725D42;
  --seed-primary: #19C8B9;
  --seed-accent: #FFCC00;
  --seed-surface: #F7F3DF;
  --seed-radius: 50px;

  --kids-cream: var(--seed-bg);
  --kids-card: var(--seed-surface);
  --kids-secondary: color-mix(in srgb, var(--seed-surface) 80%, var(--seed-fg) 8%);
  --kids-title: color-mix(in srgb, var(--seed-fg) 70%, #794F27 30%);
  --kids-text: var(--seed-fg);
  --kids-muted: color-mix(in srgb, var(--seed-fg) 55%, var(--seed-surface) 45%);
  --kids-disabled: color-mix(in srgb, var(--seed-fg) 30%, var(--seed-surface) 70%);
  --kids-primary: var(--seed-primary);
  --kids-primary-hover: color-mix(in srgb, var(--seed-primary) 85%, #ffffff 15%);
  --kids-primary-active: color-mix(in srgb, var(--seed-primary) 85%, #000 10%);
  --kids-primary-wash: color-mix(in srgb, var(--seed-primary) 10%, var(--seed-bg) 90%);
  --kids-focus: var(--seed-accent);
  --kids-success: #6FBA2C;
  --kids-warning: #F5C31C;
  --kids-danger: #E05A5A;
  --kids-button-shadow: color-mix(in srgb, var(--seed-fg) 30%, var(--seed-surface) 70%);
  --kids-input-shadow: color-mix(in srgb, var(--seed-fg) 22%, var(--seed-surface) 78%);

  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 24px;
  --radius-pill: var(--seed-radius);

  --shadow-button: 0 5px 0 0 var(--kids-button-shadow);
  --shadow-button-hover: 0 6px 0 0 var(--kids-button-shadow);
  --shadow-button-active: 0 1px 0 0 var(--kids-button-shadow);
  --shadow-input: 0 3px 0 0 var(--kids-input-shadow);
  --shadow-card: 0 4px 10px rgba(107, 92, 67, 0.12);

  --motion-fast: 0.15s;
  --motion-base: 0.25s;
  --motion-ease: cubic-bezier(0.4, 0, 0.2, 1);

  --font-display: 'Nunito', -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --font-body: 'Nunito', -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

  --tile-pink: #F8A6B2;
  --tile-purple: #B77DEE;
  --tile-blue: #889DF0;
  --tile-yellow: #F7CD67;
  --tile-orange: #E59266;
  --tile-teal: #82D5BB;
  --tile-green: #8AC68A;
  --tile-red: #FC736D;

  --wash-green: #E8F5E0;
  --wash-red: #FDECEA;
  --wash-yellow: #FFF3D6;
  --white-pure: #ffffff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  font-weight: 500;
  color: var(--kids-text);
  background: var(--kids-cream);
  line-height: 1.55;
  overflow: hidden;
  height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea { font-family: inherit; border: none; outline: none; }
:focus-visible { outline: 2px solid var(--kids-focus); outline-offset: 2px; }

/* === LOGIN PAGE === */
.login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: var(--kids-cream);
}
.login-card {
  background: var(--kids-card);
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 30px rgba(114, 93, 66, 0.15);
  padding: 48px 40px;
  width: 420px;
  max-width: 92vw;
  text-align: center;
}
.login-logo {
  width: 80px; height: 80px;
  margin: 0 auto 20px;
  background: var(--kids-primary-wash);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.login-logo svg { width: 40px; height: 40px; color: var(--kids-primary); }
.login-card h1 {
  font-size: 28px; font-weight: 800;
  color: var(--kids-title); letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.login-card .subtitle {
  font-size: 14px; color: var(--kids-muted);
  margin-bottom: 28px;
}
.input {
  width: 100%; padding: 14px 18px;
  border-radius: var(--radius-pill);
  border: 2.5px solid var(--kids-secondary);
  background: var(--kids-cream);
  font-size: 15px; font-weight: 500;
  color: var(--kids-text);
  box-shadow: var(--shadow-input);
  transition: all var(--motion-fast) var(--motion-ease);
}
.input:focus { border-color: var(--kids-focus); box-shadow: 0 0 0 3px color-mix(in srgb, var(--seed-accent) 20%, transparent); }
.input::placeholder { color: var(--kids-disabled); }

.login-field { margin-bottom: 16px; text-align: left; }
.login-field label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--kids-title); margin-bottom: 6px; letter-spacing: 0.02em;
}

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 28px;
  border-radius: var(--radius-pill);
  font-size: 15px; font-weight: 700;
  box-shadow: var(--shadow-button);
  transition: all var(--motion-fast) var(--motion-ease);
  cursor: pointer;
}
.btn-primary { background: var(--kids-primary); color: var(--white-pure); }
.btn-primary:hover { background: var(--kids-primary-hover); transform: translateY(-2px); box-shadow: var(--shadow-button-hover); }
.btn-primary:active { transform: translateY(2px); box-shadow: var(--shadow-button-active); }
.btn-secondary { background: var(--kids-secondary); color: var(--kids-text); }
.btn-secondary:hover { transform: translateY(-2px); box-shadow: var(--shadow-button-hover); }
.btn-secondary:active { transform: translateY(2px); box-shadow: var(--shadow-button-active); }

.login-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }

.login-divider {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--kids-muted); letter-spacing: 0.02em;
  margin: 16px 0;
}
.login-divider::before, .login-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--kids-secondary);
}

.room-code-display {
  background: var(--kids-primary-wash);
  border: 2px dashed var(--kids-primary);
  border-radius: var(--radius-md);
  padding: 14px;
  margin-top: 16px;
  cursor: pointer;
  transition: all var(--motion-fast) var(--motion-ease);
}
.room-code-display:hover { background: var(--kids-primary); color: var(--white-pure); }
.room-code-display:hover .room-code-label { color: rgba(255,255,255,0.8); }
.room-code-display:hover .room-code-value { color: var(--white-pure); }
.room-code-label { font-size: 12px; color: var(--kids-muted); letter-spacing: 0.02em; }
.room-code-value {
  font-size: 24px; font-weight: 800;
  color: var(--kids-title); letter-spacing: 0.08em;
  margin-top: 4px;
}

.login-status {
  margin-top: 16px; padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  display: none;
}
.login-status.show { display: block; }
.login-status.error { background: var(--wash-red); color: var(--kids-danger); }
.login-status.success { background: var(--wash-green); color: var(--kids-success); }
.login-status.info { background: var(--kids-primary-wash); color: var(--kids-primary); }

.server-info {
  margin-top: 16px; padding: 12px;
  background: var(--wash-yellow);
  border-radius: var(--radius-sm);
  font-size: 12px; color: var(--kids-text);
  text-align: left;
}
.server-info code {
  background: rgba(0,0,0,0.06);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
}

.login-footer {
  margin-top: 24px; padding-top: 16px;
  border-top: 1px solid var(--kids-secondary);
  font-size: 11px; color: var(--kids-disabled);
}
.login-footer .version { font-weight: 600; margin-bottom: 4px; }
.login-footer .developer { margin-bottom: 2px; }
.login-footer .copyright { font-size: 10px; }

/* === APP SHELL === */
.app-shell { display: none; flex-direction: column; height: 100vh; }
.app-shell.active { display: flex; }

.room-info-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  background: var(--kids-card);
  border-bottom: 1px solid var(--kids-secondary);
  font-size: 13px; color: var(--kids-muted);
  flex-shrink: 0;
}
.room-info-bar svg { color: var(--kids-success); flex-shrink: 0; }
.room-id { font-weight: 700; color: var(--kids-title); letter-spacing: 0.04em; }
.member-count { margin-left: auto; font-weight: 600; }
.leave-btn {
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  background: var(--wash-red);
  color: var(--kids-danger);
  font-size: 12px; font-weight: 600;
  transition: all var(--motion-fast) var(--motion-ease);
}
.leave-btn:hover { background: var(--kids-danger); color: var(--white-pure); }

main {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.page {
  display: none;
  height: 100%;
  overflow: hidden;
}
.page.active { display: flex; }

/* Tab bar */
.tab-bar {
  display: flex;
  background: var(--kids-card);
  border-top: 1px solid var(--kids-secondary);
  padding: 6px 0 8px;
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 12px;
  font-size: 12px; font-weight: 600;
  color: var(--kids-muted);
  transition: all var(--motion-fast) var(--motion-ease);
  border-radius: 0;
  position: relative;
}
.tab-btn.active { color: var(--kids-primary); }
.tab-btn.active::after {
  content: '';
  position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 24px; height: 3px;
  background: var(--kids-primary);
  border-radius: 2px;
}
.tab-btn svg { width: 24px; height: 24px; }

/* === CHAT PAGE === */
.chat-page { display: flex; height: 100%; }
.contact-sidebar {
  width: 300px;
  background: var(--kids-card);
  border-right: 1px solid var(--kids-secondary);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--kids-secondary);
}
.sidebar-header h2 { font-size: 20px; font-weight: 800; color: var(--kids-title); }
.sidebar-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--kids-secondary);
  position: relative;
}
.sidebar-search svg { position: absolute; left: 30px; top: 50%; transform: translateY(-60%); width: 18px; height: 18px; color: var(--kids-muted); pointer-events: none; }
.sidebar-search .input { padding-left: 44px; font-size: 13px; }
.contact-list { flex: 1; overflow-y: auto; padding: 8px; }
.contact-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--motion-fast) var(--motion-ease);
}
.contact-item:hover { background: var(--kids-secondary); }
.contact-item.active { background: var(--kids-primary-wash); }
.contact-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  color: var(--white-pure);
  flex-shrink: 0;
  position: relative;
}
.online-dot {
  position: absolute;
  bottom: 2px; right: 2px;
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid var(--kids-card);
}
.online-dot.online { background: var(--kids-success); }
.online-dot.offline { background: var(--kids-disabled); }
.contact-info { flex: 1; min-width: 0; }
.contact-name { font-size: 14px; font-weight: 700; color: var(--kids-title); }
.contact-last { font-size: 12px; color: var(--kids-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.contact-meta { text-align: right; flex-shrink: 0; }
.contact-time { font-size: 11px; color: var(--kids-disabled); }
.contact-badge {
  display: inline-block;
  min-width: 18px; height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  background: var(--kids-danger);
  color: var(--white-pure);
  font-size: 10px; font-weight: 700;
  line-height: 18px;
  text-align: center;
  margin-top: 4px;
}

.chat-area {
  flex: 1;
  display: flex; flex-direction: column;
  background: var(--kids-cream);
}
.chat-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--kids-muted);
  gap: 12px;
}
.chat-empty svg { width: 80px; height: 80px; color: var(--kids-disabled); }
.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--kids-secondary);
  display: flex; align-items: center; gap: 12px;
  background: var(--kids-card);
}
.chat-header-name { font-size: 16px; font-weight: 700; color: var(--kids-title); }
.chat-header-status { font-size: 12px; color: var(--kids-success); font-weight: 500; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg-row { display: flex; max-width: 75%; }
.msg-row.sent { align-self: flex-end; }
.msg-row.received { align-self: flex-start; }
.msg-bubble {
  padding: 10px 16px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
}
.msg-row.sent .msg-bubble {
  background: var(--kids-primary);
  color: var(--white-pure);
  border-bottom-right-radius: 4px;
}
.msg-row.received .msg-bubble {
  background: var(--kids-card);
  color: var(--kids-text);
  border-bottom-left-radius: 4px;
}
.msg-time {
  font-size: 10px;
  color: var(--kids-disabled);
  margin-top: 4px;
  text-align: right;
}
.msg-row.received .msg-time { text-align: left; }
.msg-read-status {
  font-size: 10px;
  margin-left: 6px;
}
.msg-read-status.read { color: var(--kids-primary); }
.msg-read-status.unread { color: var(--kids-disabled); }

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--kids-secondary);
  background: var(--kids-card);
  display: flex; gap: 10px; align-items: flex-end;
}
.chat-input {
  flex: 1;
  min-height: 44px; max-height: 120px;
  padding: 10px 16px;
  border-radius: 22px;
  border: 2px solid var(--kids-secondary);
  background: var(--kids-cream);
  font-size: 14px;
  resize: none;
  line-height: 1.5;
}
.chat-input:focus { border-color: var(--kids-focus); }
.send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--kids-primary);
  color: var(--white-pure);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-button);
  transition: all var(--motion-fast) var(--motion-ease);
  flex-shrink: 0;
}
.send-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-button-hover); }
.send-btn:active { transform: translateY(2px); box-shadow: var(--shadow-button-active); }

/* === TODO PAGE === */
.todo-page {
  flex-direction: column;
  padding: 24px;
  overflow-y: auto;
}
.todo-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.todo-header h2 { font-size: 24px; font-weight: 800; color: var(--kids-title); }
.todo-stats { display: flex; gap: 12px; }
.todo-stat {
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  background: var(--kids-secondary);
  font-size: 13px; font-weight: 600;
}
.todo-stat .num { font-weight: 800; color: var(--kids-primary); }

.todo-add {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.todo-add .input { flex: 1; }
.todo-add select {
  padding: 10px 14px;
  border-radius: var(--radius-pill);
  background: var(--kids-card);
  border: 2px solid var(--kids-secondary);
  font-size: 13px; font-weight: 600;
  color: var(--kids-text);
}

.todo-filters { display: flex; gap: 8px; margin-bottom: 16px; }
.filter-chip {
  padding: 6px 16px;
  border-radius: var(--radius-pill);
  background: var(--kids-secondary);
  font-size: 12px; font-weight: 600;
  color: var(--kids-muted);
  transition: all var(--motion-fast) var(--motion-ease);
}
.filter-chip.active { background: var(--kids-primary); color: var(--white-pure); }

.todo-list { display: flex; flex-direction: column; gap: 10px; }
.todo-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  background: var(--kids-card);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  animation: todoSlideIn 0.3s var(--motion-ease);
}
@keyframes todoSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.todo-checkbox {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2.5px solid var(--kids-disabled);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all var(--motion-fast) var(--motion-ease);
  flex-shrink: 0;
}
.todo-checkbox.checked { background: var(--kids-success); border-color: var(--kids-success); }
.todo-checkbox.checked::after { content: '✓'; color: var(--white-pure); font-size: 14px; font-weight: 700; }
.todo-text { flex: 1; font-size: 14px; font-weight: 500; }
.todo-item.done .todo-text { text-decoration: line-through; color: var(--kids-disabled); }
.todo-priority {
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.02em;
}
.todo-priority.high { background: var(--wash-red); color: var(--kids-danger); }
.todo-priority.medium { background: var(--wash-yellow); color: var(--text-gold); }
.todo-priority.low { background: var(--wash-green); color: var(--kids-success); }
.todo-delete {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--kids-disabled);
  transition: all var(--motion-fast) var(--motion-ease);
}
.todo-delete:hover { background: var(--wash-red); color: var(--kids-danger); }

/* === LUNCH PAGE === */
.lunch-page {
  flex-direction: column;
  align-items: center;
  padding: 24px;
  overflow-y: auto;
}
.lunch-page h2 { font-size: 24px; font-weight: 800; color: var(--kids-title); margin-bottom: 20px; }

.spinner-wrap {
  width: 300px; height: 300px;
  position: relative;
  margin-bottom: 24px;
}
.spinner-wheel {
  width: 100%; height: 100%;
  border-radius: 50%;
  position: relative;
  transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}
.spinner-pointer {
  position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 24px solid var(--kids-danger);
  z-index: 10;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}
.spinner-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--kids-card);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  display: flex; align-items: center; justify-content: center;
  z-index: 5;
}
.spinner-center svg { width: 28px; height: 28px; color: var(--kids-primary); }

.spin-btn {
  padding: 14px 40px;
  border-radius: var(--radius-pill);
  background: var(--kids-primary);
  color: var(--white-pure);
  font-size: 16px; font-weight: 700;
  box-shadow: var(--shadow-button);
  transition: all var(--motion-fast) var(--motion-ease);
  margin-bottom: 24px;
}
.spin-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-button-hover); }
.spin-btn:active { transform: translateY(2px); box-shadow: var(--shadow-button-active); }
.spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.food-tags {
  display: flex; flex-wrap: wrap; gap: 8px;
  max-width: 600px;
  justify-content: center;
  margin-bottom: 16px;
}
.food-tag {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 600;
  color: var(--kids-text);
}
.food-tag .remove {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  cursor: pointer;
  opacity: 0.5;
  transition: all var(--motion-fast) var(--motion-ease);
}
.food-tag .remove:hover { opacity: 1; background: rgba(0,0,0,0.1); }

.food-add {
  display: flex; gap: 8px;
  max-width: 400px;
  width: 100%;
}
.food-add .input { flex: 1; padding: 10px 16px; font-size: 13px; }

.lunch-result {
  margin-top: 24px;
  padding: 20px 32px;
  background: var(--kids-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);

<script>
/* ============================================================
   WebSocket 连接层
   ============================================================ */
const WS_URL = `ws://${window.location.hostname}:9001`;
let ws = null;
let myUsername = '';
let roomId = '';
let members = [];
let chatHistory = {};
let todos = [];
let foods = ['黄焖鸡', '麻辣烫', '牛肉面', '寿司', '炸鸡', '沙拉', '饺子', '螺蛳粉'];
let currentChat = null;
let todoFilter = 'all';
let quoteMsg = null;

// ============================================================
// 端到端加密 (E2EE) 模块
// 使用 ECDH 密钥交换 + AES-GCM 对称加密
// ============================================================
const e2ee = {
  myKeyPair: null,
  sharedKeys: {},

  async generateKeyPair() {
    this.myKeyPair = await crypto.subtle.generateKey(
      { name: 'ECDH', namedCurve: 'P-256' },
      true,
      ['deriveKey']
    );
  },

  async exportPublicKey() {
    const exported = await crypto.subtle.exportKey('raw', this.myKeyPair.publicKey);
    return btoa(String.fromCharCode(...new Uint8Array(exported)));
  },

  async deriveSharedKey(peerPublicKeyB64, chatKey) {
    if (this.sharedKeys[chatKey]) return this.sharedKeys[chatKey];
    const peerPublicKeyBytes = Uint8Array.from(atob(peerPublicKeyB64), c => c.charCodeAt(0));
    const peerPublicKey = await crypto.subtle.importKey(
      'raw', peerPublicKeyBytes,
      { name: 'ECDH', namedCurve: 'P-256' },
      false, []
    );
    const sharedKey = await crypto.subtle.deriveKey(
      { name: 'ECDH', public: peerPublicKey },
      this.myKeyPair.privateKey,
      { name: 'AES-GCM', length: 256 },
      true, ['encrypt', 'decrypt']
    );
    this.sharedKeys[chatKey] = sharedKey;
    return sharedKey;
  },

  async encrypt(plainText, chatKey) {
    const key = this.sharedKeys[chatKey];
    if (!key) throw new Error('未建立加密密钥');
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const encoded = new TextEncoder().encode(plainText);
    const cipherBuffer = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv: iv }, key, encoded
    );
    return {
      ciphertext: btoa(String.fromCharCode(...new Uint8Array(cipherBuffer))),
      iv: btoa(String.fromCharCode(...iv))
    };
  },

  async decrypt(ciphertextB64, ivB64, chatKey) {
    const key = this.sharedKeys[chatKey];
    if (!key) throw new Error('未建立加密密钥');
    const cipherBytes = Uint8Array.from(atob(ciphertextB64), c => c.charCodeAt(0));
    const ivBytes = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
    const plainBuffer = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: ivBytes }, key, cipherBytes
    );
    return new TextDecoder().decode(plainBuffer);
  }
};

const avatarColors = ['var(--tile-pink)','var(--tile-purple)','var(--tile-blue)','var(--tile-orange)','var(--tile-teal)','var(--tile-red)','var(--tile-green)','var(--tile-yellow)'];
function getColor(name) { let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h); return avatarColors[Math.abs(h)%avatarColors.length]; }
function getInitial(name) { return name.charAt(0); }
function formatTime(d) { const h=d.getHours().toString().padStart(2,'0'); const m=d.getMinutes().toString().padStart(2,'0'); return h+':'+m; }

function playNotificationSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function showStatus(msg, type) {
  const el = document.getElementById('login-status');
  el.textContent = msg;
  el.className = 'login-status show ' + type;
}
function clearStatus() { document.getElementById('login-status').className = 'login-status'; }

/* WebSocket 连接 */
function connectWS() {
  showStatus('正在连接服务器...', 'info');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log('WebSocket 已连接');
    document.getElementById('server-info').style.display = 'none';
    clearStatus();
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleMessage(data);
    } catch(e) {
      console.error('消息解析错误:', e);
    }
  };

  ws.onclose = () => {
    console.log('WebSocket 断开');
    showStatus('服务器连接断开，请刷新页面', 'error');
  };

  ws.onerror = (e) => {
    console.error('WebSocket 错误:', e);
    showStatus('无法连接服务器，请确保已运行 python3 server.py', 'error');
  };
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  } else {
    showStatus('服务器未连接，请稍后再试', 'error');
    console.warn('WebSocket not open, message not sent:', data);
  }
}

/* ============================================================
   消息处理
   ============================================================ */
function handleMessage(data) {
  switch(data.type) {
    case 'room-joined':
      roomId = data.room_id;
      members = data.members || [];
      if (data.state) {
        chatHistory = data.state.chat_history || {};
        todos = data.state.todos || [];
        foods = data.state.foods || foods;
      }
      // 显示本机IP
      if (data.lan_ips && data.lan_ips.length > 0) {
        const ipBar = document.getElementById('lan-ip-display');
        if (ipBar) {
          ipBar.textContent = '本机IP: ' + data.lan_ips.filter(ip => !ip.startsWith('127.')).join(' / ');
          ipBar.style.display = 'inline';
        }
      }
      enterApp();
      break;

    case 'member-joined':
      members = data.members || [];
      updateMemberCount();
      renderContacts();
      break;

    case 'member-left':
      members = data.members || [];
      updateMemberCount();
      renderContacts();
      break;

    case 'e2ee-key-offer':
      (async () => {
        const peerName = data.from;
        const chatKey = getChatKey(myUsername, peerName);
        await e2ee.deriveSharedKey(data.public_key, chatKey);
        const myPub = await e2ee.exportPublicKey();
        ws.send(JSON.stringify({ type: 'e2ee-key-answer', public_key: myPub, to_user: peerName }));
      })();
      break;

    case 'e2ee-key-answer':
      (async () => {
        const peerName = data.from;
        const chatKey = getChatKey(myUsername, peerName);
        await e2ee.deriveSharedKey(data.public_key, chatKey);
      })();
      break;

    case 'chat':
      (async () => {
        const msg = data.message;
        const ck = getChatKey(msg.from, msg.to);
        if (msg.encrypted && msg.ciphertext && msg.iv) {
          try {
            const plainText = await e2ee.decrypt(msg.ciphertext, msg.iv, ck);
            const parsed = JSON.parse(plainText);
            msg.text = parsed.text || '';
            msg.quote = parsed.quote || null;
            msg.encrypted = false;
          } catch(e) {
            msg.text = '🔒 无法解密此消息';
          }
        }
        if (!chatHistory[ck]) chatHistory[ck] = [];
        chatHistory[ck].push(msg);
        if (currentChat && (msg.from === currentChat || msg.to === currentChat)) {
          renderMessages();
        }
        renderContacts();
        if (msg.to === myUsername) playNotificationSound();
      })();
      break;

    case 'chat-receipt':
      // 消息已送达
      break;

    case 'chat-read-notify':
      // 对方已读
      const rk = data.chat_key;
      const rids = data.msg_ids || [];
      if (chatHistory[rk]) {
        chatHistory[rk].forEach(m => {
          if (rids.includes(m.id)) m.read = true;
        });
      }
      if (currentChat) {
        const curKey = getChatKey(myUsername, currentChat);
        if (curKey === rk) renderMessages();
      }
      renderContacts();
      break;

    case 'todo-added':
      todos.push(data.todo);
      renderTodos();
      break;

    case 'todo-toggled':
      todos = todos.map(t => t.id === data.id ? {...t, done: !t.done} : t);
      renderTodos();
      break;

    case 'todo-deleted':
      todos = todos.filter(t => t.id !== data.id);
      renderTodos();
      break;

    case 'food-added':
      if (data.food && !foods.includes(data.food)) foods.push(data.food);
      renderWheel();
      renderFoodTags();
      break;

    case 'food-removed':
      foods = foods.filter(f => f !== data.food);
      renderWheel();
      renderFoodTags();
      break;

    case 'sync':
      if (data.state) {
        chatHistory = data.state.chat_history || {};
        todos = data.state.todos || [];
        foods = data.state.foods || foods;
      }
      if (data.members) members = data.members;
      renderAll();
      break;

    case 'kicked':
      showStatus(data.message || '你已在其他设备登录', 'error');
      setTimeout(() => { leaveRoom(); }, 2000);
      break;

    case 'error':
      showStatus(data.message || '发生错误', 'error');
      break;
  }
}

function getChatKey(a, b) {
  return [a, b].sort().join('<->');
}

/* ============================================================
   房间操作
   ============================================================ */
function joinRoom() {
  myUsername = document.getElementById('username-input').value.trim();

  if (!myUsername) { showStatus('请先输入昵称', 'error'); return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { showStatus('正在连接服务器，请稍后再试', 'error'); return; }

  send({ type: 'join', username: myUsername });
}

function leaveRoom() {
  send({ type: 'leave', username: myUsername });
  ws.close();
  document.getElementById('app-shell').classList.remove('active');
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('username-input').value = '';
  document.getElementById('lan-ip-display').style.display = 'none';
  clearStatus();
  roomId = '';
  members = [];
  chatHistory = {};
  todos = [];
  currentChat = null;
}

/* ============================================================
   进入应用
   ============================================================ */
async function enterApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-shell').classList.add('active');

  // 只有大灰狼显示导出按钮
  document.getElementById('export-btn').style.display = myUsername === '大灰狼' ? 'inline-block' : 'none';

  updateMemberCount();
  renderAll();

  // 生成 ECDH 密钥对
  await e2ee.generateKeyPair();

  // 广播公钥给所有在线成员
  const pubKey = await e2ee.exportPublicKey();
  ws.send(JSON.stringify({ type: 'e2ee-key-offer', public_key: pubKey }));
}

function updateMemberCount() {
  const online = members.length;
  document.getElementById('member-count').textContent = online + ' 人在线';
}

/* ============================================================
   联系人渲染
   ============================================================ */
function renderContacts() {
  const list = document.getElementById('contact-list');
  const search = document.getElementById('contact-search-input').value.toLowerCase();
  const others = members.filter(m => m !== myUsername).filter(m => !search || m.toLowerCase().includes(search));

  list.innerHTML = others.map(name => {
    const chatKey = getChatKey(myUsername, name);
    const msgs = chatHistory[chatKey] || [];
    const last = msgs[msgs.length - 1];
    const unread = msgs.filter(m => m.to === myUsername && !m.read).length;
    const color = getColor(name);
    const isOnline = members.includes(name);
    return `
      <div class="contact-item ${currentChat === name ? 'active' : ''}" data-name="${name}">
        <div class="contact-avatar" style="background:${color}">
          ${getInitial(name)}
          <span class="online-dot ${isOnline ? 'online' : 'offline'}"></span>
        </div>
        <div class="contact-info">
          <div class="contact-name">${name}</div>
          <div class="contact-last">${last ? last.text.substring(0, 20) : '暂无消息'}</div>
        </div>
        <div class="contact-meta">
          <div class="contact-time">${last ? formatTime(new Date(last.time)) : ''}</div>
          ${unread > 0 ? `<div class="contact-badge">${unread}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.contact-item').forEach(item => {
    item.addEventListener('click', () => {
      currentChat = item.dataset.name;
      document.getElementById('chat-empty').style.display = 'none';
      document.getElementById('chat-active-view').style.display = 'flex';
      document.getElementById('chat-header-name').textContent = currentChat;
      renderMessages();
      renderContacts();
    });
  });
}

/* ============================================================
   消息渲染
   ============================================================ */
function renderMessages() {
  if (!currentChat) return;
  const container = document.getElementById('chat-messages');
  const chatKey = getChatKey(myUsername, currentChat);
  const msgs = chatHistory[chatKey] || [];

  container.innerHTML = msgs.map(m => {
    const isSent = m.from === myUsername;
    const readLabel = isSent ? (m.read ? '已读' : '未读') : '';
    const readClass = isSent ? (m.read ? 'read' : 'unread') : '';
    return `
      <div class="msg-row ${isSent ? 'sent' : 'received'}">
        <div>
          <div class="msg-bubble">${m.text}</div>
          <div class="msg-time">
            ${formatTime(new Date(m.time))}
            ${isSent ? `<span class="msg-read-status ${readClass}">${readLabel}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  container.scrollTop = container.scrollHeight;

  // 标记当前对话的消息为已读
  markAsRead();
}

function markAsRead() {
  if (!currentChat) return;
  const chatKey = getChatKey(myUsername, currentChat);
  const msgs = chatHistory[chatKey] || [];
  const unreadIds = msgs.filter(m => m.to === myUsername && !m.read).map(m => m.id);

  if (unreadIds.length === 0) return;

  // 本地标记为已读
  msgs.forEach(m => {
    if (m.to === myUsername && !m.read) m.read = true;
  });

  // 通知服务器
  send({
    type: 'chat-read',
    chat_key: chatKey,
    msg_ids: unreadIds,
    to_user: currentChat
  });

  // 更新未读计数
  renderContacts();
}

/* ============================================================
   发送消息 (端到端加密)
   ============================================================ */
async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentChat) return;

  const msgId = 'msg-' + Date.now();
  const msg = {
    id: msgId,
    from: myUsername,
    to: currentChat,
    text: text,
    time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
  };

  // 先添加到本地历史（即时显示）
  const chatKey = getChatKey(myUsername, currentChat);
  if (!chatHistory[chatKey]) chatHistory[chatKey] = [];
  chatHistory[chatKey].push(msg);
  renderMessages();
  renderContacts();

  // 尝试加密发送
  const sendData = {
    type: 'chat',
    msg_id: msgId,
    to_user: currentChat
  };

  const sharedKey = e2ee.sharedKeys[chatKey];
  if (sharedKey) {
    const encrypted = await e2ee.encrypt(JSON.stringify({ text: text }), chatKey);
    sendData.encrypted = true;
    sendData.ciphertext = encrypted.ciphertext;
    sendData.iv = encrypted.iv;
  } else {
    sendData.text = text;
    // 触发密钥交换
    const myPub = await e2ee.exportPublicKey();
    ws.send(JSON.stringify({ type: 'e2ee-key-offer', public_key: myPub, to_user: currentChat }));
  }

  send(sendData);

  input.value = '';
  input.style.height = 'auto';
}

/* ============================================================
   待办渲染
   ============================================================ */
function renderTodos() {
  const list = document.getElementById('todo-list');
  const filtered = todos.filter(t => {
    if (todoFilter === 'active') return !t.done;
    if (todoFilter === 'done') return t.done;
    return true;
  });

  document.getElementById('todo-total').textContent = todos.length;
  document.getElementById('todo-done').textContent = todos.filter(t => t.done).length;

  list.innerHTML = filtered.map(t => `
    <div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
      <div class="todo-checkbox ${t.done ? 'checked' : ''}" data-id="${t.id}"></div>
      <div class="todo-text">${t.text}</div>
      <span class="todo-priority ${t.priority}">${t.priority === 'high' ? '高' : t.priority === 'low' ? '低' : '中'}</span>
      <button class="todo-delete" data-id="${t.id}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');

  list.querySelectorAll('.todo-checkbox').forEach(cb => {
    cb.addEventListener('click', () => {
      send({ type: 'todo-toggle', id: cb.dataset.id });
    });
  });

  list.querySelectorAll('.todo-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      send({ type: 'todo-delete', id: btn.dataset.id });
    });
  });
}

/* ============================================================
   转盘渲染
   ============================================================ */
const segmentColors = ['#F8A6B2','#B77DEE','#889DF0','#F7CD67','#E59266','#82D5BB','#8AC68A','#FC736D','#F8A6B2','#B77DEE'];
let spinAngle = 0;

function renderWheel() {
  const wheel = document.getElementById('spinner-wheel');
  if (foods.length === 0) {
    wheel.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--kids-muted);font-size:14px;">添加食物开始转盘</div>';
    return;
  }

  const segAngle = 360 / foods.length;
  let svg = `<svg viewBox="0 0 300 300" style="width:100%;height:100%;">`;

  foods.forEach((food, i) => {
    const startAngle = i * segAngle - 90;
    const endAngle = startAngle + segAngle;
    const largeArc = segAngle > 180 ? 1 : 0;
    const x1 = 150 + 150 * Math.cos(startAngle * Math.PI / 180);
    const y1 = 150 + 150 * Math.sin(startAngle * Math.PI / 180);
    const x2 = 150 + 150 * Math.cos(endAngle * Math.PI / 180);
    const y2 = 150 + 150 * Math.sin(endAngle * Math.PI / 180);
    const midAngle = startAngle + segAngle / 2;
    const textR = 100;
    const tx = 150 + textR * Math.cos(midAngle * Math.PI / 180);
    const ty = 150 + textR * Math.sin(midAngle * Math.PI / 180);

    svg += `<path d="M150,150 L${x1},${y1} A150,150 0 ${largeArc},1 ${x2},${y2} Z" fill="${segmentColors[i % segmentColors.length]}" stroke="var(--kids-card)" stroke-width="2"/>`;
    svg += `<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" fill="var(--kids-title)" font-size="${foods.length > 8 ? 11 : 13}" font-weight="700" transform="rotate(${midAngle},${tx},${ty})">${food}</text>`;
  });

  svg += '</svg>';
  wheel.innerHTML = svg;
}

function renderFoodTags() {
  const container = document.getElementById('food-tags');
  container.innerHTML = foods.map((food, i) => `
    <div class="food-tag" style="background:${segmentColors[i % segmentColors.length]}22;">
      ${food}
      <span class="remove" data-food="${food}">×</span>
    </div>
  `).join('');

  container.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', () => {
      send({ type: 'food-remove', food: btn.dataset.food });
    });
  });
}

function spinWheel() {
  if (foods.length < 2) { showStatus('至少需要 2 个食物选项', 'error'); return; }

  const btn = document.getElementById('spin-btn');
  btn.disabled = true;

  const segAngle = 360 / foods.length;
  const winnerIndex = Math.floor(Math.random() * foods.length);
  const extraSpins = 5 + Math.floor(Math.random() * 3);
  const targetAngle = extraSpins * 360 + (360 - winnerIndex * segAngle - segAngle / 2);

  spinAngle += targetAngle;
  document.getElementById('spinner-wheel').style.transform = `rotate(${spinAngle}deg)`;

  setTimeout(() => {
    btn.disabled = false;
    document.getElementById('result-text').textContent = foods[winnerIndex];
    document.getElementById('lunch-result').classList.add('show');
    showCelebration();
  }, 3200);
}

function showCelebration() {
  const cel = document.getElementById('celebration');
  cel.classList.add('show'); cel.innerHTML = '';
  const colors = ['var(--tile-pink)','var(--tile-purple)','var(--tile-blue)','var(--kids-focus)','var(--kids-success)','var(--tile-red)','var(--kids-primary)','var(--tile-orange)'];
  for (let i = 0; i < 40; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = Math.random() * 100 + '%';
    conf.style.top = -10 + 'px';
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.animationDelay = Math.random() * 0.8 + 's';
    conf.style.width = (6 + Math.random() * 8) + 'px';
    conf.style.height = (6 + Math.random() * 8) + 'px';
    cel.appendChild(conf);
  }
  setTimeout(() => { cel.classList.remove('show'); cel.innerHTML = ''; }, 2500);
}

/* ============================================================
   渲染所有
   ============================================================ */
function renderAll() {
  renderContacts();
  renderMessages();
  renderTodos();
  renderWheel();
  renderFoodTags();
  updateMemberCount();
}

/* ============================================================
   初始化
   ============================================================ */
(function() {
  // 连接 WebSocket
  connectWS();

  // 进入按钮
  document.getElementById('enter-btn').addEventListener('click', joinRoom);
  document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });

  // 离开房间
  document.getElementById('leave-room-btn').addEventListener('click', leaveRoom);

  // 导出聊天记录
  document.getElementById('export-btn').addEventListener('click', () => {
    window.open('/api/export', '_blank');
  });

  // 标签页切换
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.page).classList.add('active');
    });
  });

  // 聊天输入
  const chatInput = document.getElementById('chat-input');
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  });
  document.getElementById('send-btn').addEventListener('click', sendChat);

  // 联系人搜索
  document.getElementById('contact-search-input').addEventListener('input', renderContacts);

  // 待办
  document.getElementById('todo-add-btn').addEventListener('click', () => {
    const text = document.getElementById('todo-input').value.trim();
    const priority = document.getElementById('todo-priority').value;
    if (!text) return;
    send({ type: 'todo-add', todo: { id: 'todo-' + Date.now(), text, priority, done: false } });
    document.getElementById('todo-input').value = '';
  });
  document.getElementById('todo-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('todo-add-btn').click(); });

  // 待办筛选
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      todoFilter = chip.dataset.filter;
      renderTodos();
    });
  });

  // 午餐转盘
  document.getElementById('spin-btn').addEventListener('click', spinWheel);
  document.getElementById('food-add-btn').addEventListener('click', () => {
    const food = document.getElementById('food-input').value.trim();
    if (!food) return;
    send({ type: 'food-add', food });
    document.getElementById('food-input').value = '';
  });
  document.getElementById('food-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('food-add-btn').click(); });
})();
</script>
